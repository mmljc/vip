<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘文件下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 放大白色盒子 */
        .box {
            width: 95%;
            max-width: 600px;
            padding: 60px 50px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 35px;
            color: #333;
            font-size: 24px;
        }
        .input-item {
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            height: 55px;
            padding: 0 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 17px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #409eff;
        }
        .btn {
            width: 100%;
            height: 55px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #337ecc;
        }
        .tip {
            color: red;
            font-size: 15px;
            margin: 12px 0;
            display: none;
            text-align: center;
        }
        .download-wrap {
            display: none;
            text-align: center;
        }
        .download-wrap p {
            font-size: 16px;
            color: #666;
            margin: 15px 0 25px;
        }
        .download-btn {
            display: inline-block;
            padding: 15px 40px;
            background: #67c23a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 17px;
            transition: 0.3s;
        }
        .download-btn:hover {
            background: #559f2e;
        }
        .reset-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: #909399;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .reset-btn:hover {
            background: #7b7d82;
        }
    </style>
   
</head>
<body>
    <div class="box">
        <!-- 密码区域 -->
        <div class="pwd-wrap" id="pwdWrap">
            <h2>请输入获取文件密码</h2>
            <p>对本页面有疑惑？</p>
            <p>请加大佬QQ</p>
            <p>3780504066</p>
            <div class="input-item">
                <input type="password" id="pwd" placeholder="请输入密码">
            </div>
            <div class="tip" id="tip">密码错误
                小提示：密码需要加大佬QQ获取</div>
            <button class="btn" onclick="checkPwd()">确认</button>
        </div>

        <!-- 下载区域 -->
        <div class="download-wrap" id="downloadBox">
            <h2>恭喜你，密码正确</h2>
            <P>使用说明</P>
                
<p>用户在使用本网站的服务时，必须遵守以下规则</P>
    
<P>1.用户使用本网站的服务，一切的行为后果均为用户自负，本网站只提供文件服务，不承认担任何责任！</P>
    
<P>2.下载的文件必须要在没有网络后才能运行，否则无法达到破网的效果！</P>

<P>3.文件必须在有网络的情况下下载，否则无法使用</P>
    
<P>4.下载的文件可以在下载文件夹中找到</P>
            <p>点击下载按钮下载文件</p>
            <a href="https://mmljc.github.io/mmljc/runme.bat" class="download-btn">下载文件</a>
            <!-- 手动重置返回密码页按钮 -->
            <button class="reset-btn" onclick="resetPage()">返回密码页</button>
        </div>
    </div>

    <script>
        // 自定义访问密码
        const truePwd = "3780504066";

        // 校验密码
        function checkPwd() {
            let pwdVal = document.getElementById('pwd').value.trim();
            let tip = document.getElementById('tip');
            let downloadBox = document.getElementById('downloadBox');
            let pwdWrap = document.getElementById('pwdWrap');

            if(pwdVal === truePwd){
                tip.style.display = 'none';
                pwdWrap.style.display = 'none';
                downloadBox.style.display = 'block';
            }else{
                tip.style.display = 'block';
            }
        }

        // 手动重置返回密码页
        function resetPage(){
            location.reload();
        }

        // 页面刷新自动重置为初始密码页面状态
        window.onload = function(){
            document.getElementById('pwd').value = '';
            document.getElementById('tip').style.display = 'none';
            document.getElementById('pwdWrap').style.display = 'block';
            document.getElementById('downloadBox').style.display = 'none';
        }
    </script>
</body>
</html>
